<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Control Panel</title>

<style>
body {
    margin: 0;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
    background: #0b1220;
    color: #e2e8f0;
    padding: 40px 20px;
}

/* HEADER */
h1 {
    text-align: center;
    font-size: 26px;
    margin-bottom: 40px;
    color: #38bdf8;
    letter-spacing: 1px;
}

/* SECTION CARD */
.section {
    background: #111827;
    border: 1px solid #1f2937;
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 22px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
}

.section h3 {
    margin-top: 0;
    margin-bottom: 14px;
    font-size: 14px;
    color: #94a3b8;
    letter-spacing: 1px;
    text-transform: uppercase;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
}

/* BUTTON */
.btn {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px 14px;
    border-radius: 10px;
    text-decoration: none;
    color: #e2e8f0;
    background: #1f2937;
    border: 1px solid #2b3648;
    transition: 0.2s ease;
    font-size: 14px;
}

.btn:hover {
    transform: translateY(-2px);
    border-color: #38bdf8;
    box-shadow: 0 0 15px rgba(56,189,248,0.15);
}

/* VARIANTS */
.btn-danger {
    background: #2a1215;
    border-color: #7f1d1d;
}

.btn-danger:hover {
    border-color: #ef4444;
    box-shadow: 0 0 15px rgba(239,68,68,0.2);
}

.btn-warning {
    background: #2a220f;
    border-color: #a16207;
}

.btn-warning:hover {
    border-color: #facc15;
    box-shadow: 0 0 15px rgba(250,204,21,0.2);
}

.btn-primary {
    background: #0f2233;
    border-color: #1d4ed8;
}

.btn-primary:hover {
    border-color: #38bdf8;
}

/* SMALL LABEL */
.note {
    font-size: 12px;
    color: #64748b;
    margin-top: 6px;
}
</style>
</head>

<body>

<h1>API CONTROL PANEL</h1>

<!-- DATA -->
<div class="section">
    <h3>Data Management</h3>
    <div class="grid">
        <a href="/viewData/" class="btn btn-primary">View Single Data</a>
        <a href="/backupData/" class="btn">Backup Data</a>
        <a href="/viewAllData/" class="btn btn-warning">View All Data</a>
    </div>
</div>

<!-- ACCOUNT -->
<div class="section">
    <h3>Account Settings</h3>
    <div class="grid">
        <a href="/updateUsername/" class="btn">Update Username</a>
        <a href="/updateEmail/" class="btn">Update Email</a>
        <a href="/updatePassword/" class="btn">Update Password</a>
    </div>
</div>

<!-- DANGER -->
<div class="section">
    <h3 style="color:#f87171;">Danger Zone</h3>
    <div class="grid">
        <a href="/deactivateAccount/" class="btn btn-danger">Deactivate Account</a>
        <a href="/deleteAllData/" class="btn btn-danger">Delete All Data</a>
    </div>
</div>

<!-- OTHER -->
<div class="section">
    <h3>Other</h3>
    <div class="grid">
        <a href="/api_doc/" class="btn btn-primary">API Documentation</a>
    </div>
    <div class="note">
        Developer tools and internal documentation access
    </div>
</div>

</body>
</html>
