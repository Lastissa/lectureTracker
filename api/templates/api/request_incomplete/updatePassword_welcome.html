<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Password Reset</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #e2e8f0;
      background: linear-gradient(270deg, #0f172a, #1e293b, #020617);
      background-size: 600% 600%;
      animation: gradientShift 12s ease infinite;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .card {
      background: rgba(17, 24, 39, 0.85);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 16px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }

    h2 {
      color: #38bdf8;
      text-align: center;
      margin-bottom: 15px;
    }

    p {
      text-align: center;
      font-size: 14px;
      color: #cbd5e1;
      margin-bottom: 20px;
    }

    .input-group {
      position: relative;
      margin-bottom: 20px;
    }

    .input-group input {
      width: 100%;
      padding: 14px 12px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #020617;
      color: #e2e8f0;
      outline: none;
      font-size: 14px;
    }

    .input-group label {
      position: absolute;
      left: 12px;
      top: 14px;
      font-size: 13px;
      color: #64748b;
      pointer-events: none;
      transition: 0.2s;
      background: #020617;
      padding: 0 4px;
    }

    .input-group input:focus + label,
    .input-group input:not(:placeholder-shown) + label {
      top: -8px;
      font-size: 11px;
      color: #38bdf8;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #38bdf8;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    .back-btn {
      margin-top: 10px;
      background: #334155;
      color: #e2e8f0;
    }

    .error {
      color: #f87171;
      font-size: 12px;
      text-align: center;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>

<body>

  <div class="card">
    <h2>Password Reset</h2>

    <p>Enter your email to receive an OTP.</p>

    <!-- FORM POST TO SAME PAGE -->
    <form method="POST">
      {% csrf_token %}

      <div class="input-group">
        <input type="email" name="email" id="email" placeholder=" " required>
        <label for="email">Email Address</label>
      </div>

      <button type="submit">Continue</button>
    </form>

    <button class="back-btn" onclick="goBack()">Go Back</button>

    <div class="error" id="errorMsg">
      Please enter a valid email.
    </div>
  </div>

  <script>
    function goBack() {
      window.history.back();
    }
  </script>

</body>
</html>
