<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>View Data</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #111827;
      padding: 30px;
      border-radius: 14px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    h2 {
      color: #38bdf8;
      margin-bottom: 10px;
    }

    p {
      font-size: 14px;
      color: #cbd5e1;
      margin-bottom: 20px;
      line-height: 1.5;
    }

input {
  width: 100%;
  padding: 12px 14px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #334155;
  background: #020617;
  color: #e2e8f0;
  font-size: 14px;
  outline: none;
  transition: all 0.2s ease;
  box-sizing: border-box;
}

input::placeholder {
  color: #64748b;
}

input:focus {
  border: 1px solid #38bdf8;
  background: #020617;
  box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
}

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: #38bdf8;
      border: none;
      border-radius: 8px;
      color: black;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #0ea5e9;
    }

    .back-btn {
      background: #334155;
      color: #e2e8f0;
    }

    .back-btn:hover {
      background: #475569;
    }

    .note {
      font-size: 12px;
      margin-top: 15px;
      color: #94a3b8;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="card">
    <h2>View User Data</h2>

    <p>
      This page is used to retrieve user data from the backend system.
      Please provide valid authentication credentials (email and password)
      to proceed with the request.
    </p>

    <input type="email" id="email" placeholder="Enter email" required>
   <div style="position: relative;">
  <input type="password" id="password" placeholder="Enter password" required>

  <span onclick="togglePassword()"
        id="toggleText"
        style="
          position:absolute;
          right:10px;
          top:50%;
          transform:translateY(-50%);
          cursor:pointer;
          font-size:12px;
          color:#38bdf8;
          user-select:none;
        ">
    Show
  </span>
</div>
    <button onclick="redirectUser()">Fetch Data</button>

    <!-- Back Button -->
    <button class="back-btn" onclick="goBack()">Go Back</button>

    <div class="note">
      Ensure credentials are correct before submitting.
    </div>
  </div>

  <script>
  function togglePassword() {
  const input = document.getElementById("password");
  const toggle = document.getElementById("toggleText");

  if (input.type === "password") {
    input.type = "text";
    toggle.innerText = "Hide";
  } else {
    input.type = "password";
    toggle.innerText = "Show";
  }
}
    function redirectUser() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      if (!email || !password) {
        alert("Both email and password are required.");
        return;
      }

      const url =window.location.origin +
        "/viewData/?email=" +
        encodeURIComponent(email) +
        "&password=" +
        encodeURIComponent(password);

      window.location.href = url;
    }

    function goBack() {
      window.history.back();
    }
  </script>

</body>
</html>
