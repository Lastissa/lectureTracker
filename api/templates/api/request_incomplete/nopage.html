<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Not Available</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #0b1220;
  font-family: Arial, sans-serif;
  color: #e2e8f0;
}

.card {
  background: #111827;
  padding: 30px;
  border-radius: 14px;
  text-align: center;
  width: 90%;
  max-width: 400px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  border: 1px solid #1f2937;
}

h1 {
  color: #38bdf8;
  margin-bottom: 10px;
  font-size: 20px;
}

p {
  color: #94a3b8;
  font-size: 14px;
  margin-bottom: 20px;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #38bdf8;
  color: black;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #0ea5e9;
}

.small {
  margin-top: 12px;
  font-size: 12px;
  color: #64748b;
}
</style>
</head>

<body>

<div class="card">
  <h1>Not Available</h1>
  <p>This page or feature is temporarily unavailable.</p>

  <button onclick="goBack()">Go Back</button>

  <div class="small">
    You will also be redirected automatically…
  </div>
</div>

<script>
function goBack() {
  window.history.back();
}

/* auto redirect after 3 seconds */
setTimeout(() => {
  window.history.back();
}, 3000);
</script>

</body>
</html>
