<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Incorrect Password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #111827;
      padding: 35px;
      border-radius: 14px;
      width: 90%;
      max-width: 450px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    h1 {
      color: #38bdf8;
      margin-bottom: 15px;
    }

    p {
      font-size: 14px;
      color: #cbd5e1;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .hint {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 25px;
    }

    .icon {
      font-size: 42px;
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #38bdf8;
      color: black;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #0ea5e9;
    }

    .secondary {
      margin-top: 10px;
      background: #334155;
      color: #e2e8f0;
    }

    .secondary:hover {
      background: #475569;
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="icon">🔒</div>

    <h1>Incorrect Password</h1>

    <p>
      The email you entered exists in our system, but the password provided is incorrect.
      Please verify your credentials and try again.
    </p>

    <div class="hint">
      If you have forgotten your password, you can reset it securely.
    </div>

    <button onclick="retryLogin()">
      Try Again
    </button>

    <button class="secondary" onclick="resetPassword()">
      Change / Reset Password
    </button>
  </div>

  <script>
    function retryLogin() {
      window.location.href = window.location.origin+ "/viewData/";
    }

    function resetPassword() {
      window.location.href = window.location.origin+"/updatePassword/";
    }
  </script>

</body>
</html>
