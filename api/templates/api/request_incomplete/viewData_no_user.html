<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Not Found</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #111827;
      padding: 35px;
      border-radius: 14px;
      width: 90%;
      max-width: 450px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    h1 {
      color: #38bdf8;
      margin-bottom: 15px;
    }

    p {
      font-size: 14px;
      color: #cbd5e1;
      line-height: 1.6;
      margin-bottom: 25px;
    }

    .warning {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 25px;
    }

    button {
      background: #38bdf8;
      border: none;
      padding: 12px 18px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      color: black;
      transition: 0.2s;
      width: 100%;
    }

    button:hover {
      background: #0ea5e9;
    }

    .icon {
      font-size: 40px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="icon">⚠️</div>

    <h1>User Not Found</h1>

    <p>
      The email address you provided does not exist in our records.
      This means there is no account associated with these credentials.
    </p>

    <div class="warning">
      If you are a new user, please create an account to continue.
    </div>

    <button onclick="goToCreateAccount()">
      Create New Account
    </button>
  </div>

  <script>
    function goToCreateAccount() {
      window.location.href = "http://127.0.0.1:8000/createAccount/";
    }
  </script>

</body>
</html>
